@if (shortestPath) {
  <p>
    Start at <strong>{{ shortestPath.startingStation }}</strong> station.
  </p>
  @for (station of shortestPath.stationsToSwitchLines; track station) {
    <p>
      Go to <strong>{{ station }}</strong> station. You will switch lines at that station.
    </p>
  }
  <p>
    Go to <strong>{{ shortestPath.destinationStation }}</strong> station.
  </p>
}
