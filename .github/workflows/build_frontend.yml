name: Frontend build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cov:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Coverage
        run: make cov-frontend