name: End-to-end testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run backend with nohup and in background
        run: make run-backend-nohup-background
      - name: Wait for API
        run: make wait-for-api
      - name: Install dependencies
        run: npm ci
        working-directory: frontend/shortesttm-path
      - name: Install Cypress
        run: npm install --save-dev cypress
      - name: Install Angular CLI
        run: npm install -g @angular/cli
      - name: Run frontend with nohup and in background
        run: make run-frontend-nohup-background
      - name: Wait for frontend
        run: make wait-for-frontend
      - name: Run end-to-end tests
        run: make run-e2e-tests