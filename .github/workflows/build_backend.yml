name: Backend build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checkstyle:
    name: Checkstyle and complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Checkstyle and complexity
        run: make checkstyle-backend

  cov:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Coverage
        run: make cov-backend

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run backend with nohup and in background
        run: cd backend/shortesttm_path && chmod +x mvnw && ./mvnw spring-boot:run > backend.log 2>&1
      - name: Wait for API
        run: make wait-for-api
      - name: API tests
        run: make api-tests