name: Deploy Javadoc

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-javadoc:
    name: Deploy Javadoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Deploy Javadoc
        run: |
          git clone https://github.com/antoinebrunet1/shortesttm-path.git
          cd shortesttm-path/backend/shortesttm_path
          git checkout -b gh-pages
          mvn clean javadoc:javadoc
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add -A
          git commit -m "Generated Javadoc"
          git remote add origin https://github.com/antoinebrunet1/shortesttm-path.git
          git push origin gh-pages